services:
  postgres:
    image: postgres:16
    container_name: pulsecommerce_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d order_db']
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pulsecommerce_rabbitmq
    hostname: pulsecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: pulsecommerce_order_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ORDER_SERVICE_PORT: 8081
      ORDER_DATABASE_URL: postgres://postgres:postgres@postgres:5432/order_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2f
      AMQP_EXCHANGE: ${AMQP_EXCHANGE}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOGISTICS_PROVIDER: ${LOGISTICS_PROVIDER}
      LOGISTICS_API_BASE_URL: ${LOGISTICS_API_BASE_URL}
      LOGISTICS_API_KEY: ${LOGISTICS_API_KEY}
    expose:
      - '8081'
    restart: on-failure

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: pulsecommerce_payment_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PAYMENT_SERVICE_PORT: 8082
      PAYMENT_DATABASE_URL: postgres://postgres:postgres@postgres:5432/payment_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2f
      AMQP_EXCHANGE: ${AMQP_EXCHANGE}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER}
      PAYMENT_API_BASE_URL: ${PAYMENT_API_BASE_URL}
      PAYMENT_API_KEY: ${PAYMENT_API_KEY}
    expose:
      - '8082'
    restart: on-failure

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: pulsecommerce_notification_service
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NOTIFICATION_SERVICE_PORT: 8083
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2f
      AMQP_EXCHANGE: ${AMQP_EXCHANGE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GATEWAY_DATABASE_URL: postgres://postgres:postgres@postgres:5432/gateway_db
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      EMAIL_API_BASE_URL: ${EMAIL_API_BASE_URL}
      EMAIL_API_KEY: ${EMAIL_API_KEY}
      SMS_PROVIDER: ${SMS_PROVIDER}
      SMS_API_BASE_URL: ${SMS_API_BASE_URL}
      SMS_API_KEY: ${SMS_API_KEY}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL}
      NOTIFICATION_FROM_PHONE: ${NOTIFICATION_FROM_PHONE}
      NOTIFICATION_FALLBACK_PHONE: ${NOTIFICATION_FALLBACK_PHONE}
    ports:
      - '8083:8083'
    restart: on-failure

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: pulsecommerce_api_gateway
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
      notification-service:
        condition: service_started
    environment:
      API_GATEWAY_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      ORDER_SERVICE_URL: http://order-service:8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/gateway_db
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
    ports:
      - '8080:8080'
    restart: on-failure

volumes:
  postgres_data:
  rabbitmq_data:
